<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegir nueva contraseña — MercadoAlerta</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
<link rel="icon" type="image/svg+xml" href="/assets/mercadoalerta-icon.svg">

</head>
<body>

<div class="card">
  <div class="logo"><img src="/assets/mercadoalerta-icon.svg" class="logo-seal"/>MercadoAlerta</div>
  <p class="sub">Elige tu nueva contraseña.</p>

  <form id="resetForm">
    <label for="password">Nueva contraseña</label>
    <input type="password" id="password" minlength="8" required>

    <label for="passwordConfirm">Confirmar contraseña</label>
    <input type="password" id="passwordConfirm" minlength="8" required>

    <button type="submit" id="submitBtn">Guardar nueva contraseña</button>
    <div class="error" id="errorMsg"></div>
    <div class="notice" id="noticeMsg"></div>
  </form>

  <div class="footer-link">
    <a href="login.html">Volver a iniciar sesión</a>
  </div>
</div>

<script src="js/reset-password.js"></script>

</body>
</html>
