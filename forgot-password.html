<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña — MercadoAlerta</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/index.css">
<link rel="icon" type="image/svg+xml" href="/assets/mercadoalerta-icon.svg">

</head>
<body>

<div class="card">
  <div style="text-align: center; margin-bottom: 20px;">
    <div class="mark-forgot-pass"><div class="icon"><img src="/assets/icons/clave-de-usuario.svg" class="icon-desc"></img></div></div>
    <div class="logo-forgot-pass">Recuperar Contraseña</div>
    <p class="sub">Ingresa tu email y te enviaremos un link para recuperar tu contraseña.</p>
  </div>
  <form id="forgotForm">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="nombre@miempresa.cl" required>

    <button type="submit" id="submitBtn">Enviar link de recuperación</button>
    <div class="error" id="errorMsg"></div>
    <div class="notice" id="noticeMsg"></div>
  </form>

  <div class="footer-link">
    <a href="login.html">← Volver a iniciar sesión</a>
  </div>
</div>

<script src="js/forgot-password.js"></script>

</body>
</html>
