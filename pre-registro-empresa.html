<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registra tu empresa — MercadoAlerta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="card">
  <div class="logo"><span class="logo-seal"></span>MercadoAlerta</div>
  <p class="sub">Antes de crear tu cuenta, registra tu empresa con su RUT. Lo validamos contra Mercado Público — es un paso único, el resto de los usuarios de tu empresa no lo vuelven a hacer.</p>
  <p class="sub" style="margin-top: -8px;">Plan seleccionado: <strong id="planSeleccionado" style="color: var(--gold);">Trial</strong></p>

  <form id="preRegistroForm">
    <label for="rut">RUT de la empresa</label>
    <input type="text" id="rut" placeholder="12.345.678-9" required>
    <div class="field-hint" id="rutHint"></div>

    <label for="responsableNombre">Nombre del responsable</label>
    <input type="text" id="responsableNombre" required>

    <label for="responsableApellido">Apellido del responsable</label>
    <input type="text" id="responsableApellido" required>

    <label for="emailContacto">Email de contacto</label>
    <input type="email" id="emailContacto" required>

    <label for="telefonoContacto">Teléfono de contacto</label>
    <input type="tel" id="telefonoContacto" placeholder="+56 9 1234 5678" required>

    <label class="checkbox-row" for="declaraEmt">
      <input type="checkbox" id="declaraEmt" required>
      <span>Declaro que mi empresa es EMT (Empresa de Menor Tamaño)</span>
      <span class="info-icon" tabindex="0">i
        <span class="tooltip-bubble">Esta herramienta está destinada para EMT, por lo que en caso de no cumplir con este requisito, la cuenta puede ser cancelada.</span>
      </span>
    </label>

    <button type="submit" id="submitBtn">Registrar empresa</button>
    <div class="error" id="errorMsg"></div>
    <div class="notice" id="noticeMsg"></div>
  </form>

  <div class="footer-link">
    ¿Tu empresa ya está registrada? <a href="register.html">Crea tu cuenta</a>
  </div>
  <div class="footer-link">
    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
  </div>
</div>

<script src="js/pre-registro-empresa.js"></script>

</body>
</html>
