<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — MercadoAlerta</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="card">
  <div class="logo"><span class="logo-seal"></span>MercadoAlerta</div>
  <p class="sub">Ingresa a tu cuenta para gestionar tus alertas.</p>

  <form id="loginForm">
    <label for="email">Email</label>
    <input type="email" id="email" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" required>

    <button type="submit" id="submitBtn">Iniciar sesión</button>
    <div class="error" id="errorMsg"></div>
  </form>

  <div class="footer-link">
    <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>
  </div>
  <div class="footer-link">
    ¿Primera vez? <a href="pre-registro-empresa.html">Registra tu empresa</a>
  </div>
  <div class="footer-link">
    ¿Tu empresa ya está registrada? <a href="register.html">Crea tu cuenta</a>
  </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
