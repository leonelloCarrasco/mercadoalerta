<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — MercadoAlerta</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="card">
  <div class="logo"><span class="logo-seal"></span>MercadoAlerta</div>
  <p class="sub">Crea tu cuenta para empezar a recibir alertas de licitaciones.</p>

  <form id="registerForm">
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" required>

    <label for="apellido">Apellido</label>
    <input type="text" id="apellido" required>

    <label for="email">Email</label>
    <input type="email" id="email" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" minlength="8" required>

    <label for="passwordConfirm">Confirmar contraseña</label>
    <input type="password" id="passwordConfirm" minlength="8" required>

    <label for="rutEmpresa">RUT de la empresa</label>
    <input type="text" id="rutEmpresa" placeholder="12.345.678-9" required>
    <div class="field-hint" id="rutEmpresaHint"></div>
    <div class="footer-link" style="margin: -4px 0 12px; text-align: left;">
      ¿Tu empresa todavía no está registrada? <a href="pre-registro-empresa.html">Regístrala primero</a>
    </div>

    <button type="submit" id="submitBtn">Crear cuenta</button>
    <div class="error" id="errorMsg"></div>
    <div class="notice" id="noticeMsg"></div>
  </form>

  <div class="footer-link">
    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
  </div>
</div>

<script src="js/register.js"></script>

</body>
</html>
