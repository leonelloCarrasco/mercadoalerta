<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de empresa — MercadoAlerta</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
<style>
  .panel-card { max-width: 480px; text-align: left; }
  .panel-card .logo { justify-content: flex-start; }
  .readonly-field { margin-bottom: 14px; }
  .readonly-field .field-label { display:block; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .readonly-field strong { color: var(--text); display:block; font-size:15px; font-weight: 500; }
</style>
</head>
<body>

<!-- Paso 1: solicitar acceso -->
<div class="card" id="solicitarCard">
  <div class="logo"><span class="logo-seal"></span>MercadoAlerta</div>
  <p class="sub">Gestión de empresa. Ingresa el RUT y el email de contacto registrado — te enviamos un link de acceso, no necesitas contraseña.</p>

  <form id="solicitarForm">
    <label for="rut">RUT de la empresa</label>
    <input type="text" id="rut" placeholder="12.345.678-9" required>
    <div class="field-hint" id="rutHint"></div>

    <label for="email">Email de contacto</label>
    <input type="email" id="email" required>

    <button type="submit" id="solicitarBtn">Enviar link de acceso</button>
    <div class="error" id="solicitarError"></div>
    <div class="notice" id="solicitarNotice"></div>
  </form>

  <div class="footer-link">
    <a href="login.html">Volver a iniciar sesión</a>
  </div>
</div>

<!-- Paso 2: verificando token de la URL -->
<div class="card" id="verificandoCard" style="display:none;">
  <div class="logo"><span class="logo-seal"></span>MercadoAlerta</div>
  <p class="sub">Verificando tu acceso...</p>
  <div class="error" id="verificarError"></div>
</div>

<!-- Paso 3: panel de gestión -->
<div class="card panel-card" id="panelCard" style="display:none;">
  <div class="logo"><span class="logo-seal"></span>MercadoAlerta</div>
  <p class="sub">Gestión de empresa</p>

  <div class="readonly-field">
    <span class="field-label">Empresa</span>
    <strong id="panelNombreEmpresa"></strong>
  </div>
  <div class="readonly-field">
    <span class="field-label">RUT</span>
    <strong id="panelRut"></strong>
  </div>
  <div class="readonly-field">
    <span class="field-label">Plan actual</span>
    <strong id="panelPlan"></strong>
  </div>

  <hr style="border-color: var(--border); margin: 20px 0;">

  <h3 style="margin-bottom:14px; font-size:15px;">Datos de contacto</h3>
  <form id="contactoForm">
    <label for="responsableNombre">Nombre del responsable</label>
    <input type="text" id="responsableNombre" required>

    <label for="responsableApellido">Apellido del responsable</label>
    <input type="text" id="responsableApellido" required>

    <label for="emailContacto">Email de contacto</label>
    <input type="email" id="emailContacto" required>

    <label for="telefonoContacto">Teléfono de contacto</label>
    <input type="tel" id="telefonoContacto" required>

    <button type="submit" id="contactoBtn">Guardar cambios</button>
    <div class="error" id="contactoError"></div>
    <div class="notice" id="contactoNotice"></div>
  </form>
</div>

<script src="js/gestion-empresa.js"></script>

</body>
</html>
